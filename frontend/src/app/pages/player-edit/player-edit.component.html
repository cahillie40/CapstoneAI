<h2>Edit Player</h2>

@if (loading) {
  <p>Loading...</p>
}

@if (error) {
  <p class="error">{{ error }}</p>
}

@if (!loading) {
  <form (ngSubmit)="save()" #playerForm="ngForm" class="player-form">
    <div class="form-grid">

      <div class="form-group">
        <label>Name</label>
        <input [(ngModel)]="player.name" name="name" required />
      </div>

      <div class="form-group">
        <label>Age</label>
        <input type="number" [(ngModel)]="player.age" name="age" required />
      </div>

      <div class="form-group">
        <label>Position</label>
        <input [(ngModel)]="player.position" name="position" required />
      </div>

      <div class="form-group">
        <label>Team</label>
        <input [(ngModel)]="player.team" name="team" required />
      </div>

      <div class="form-group">
        <label>Matches Played</label>
        <input type="number" [(ngModel)]="player.matchesPlayed" name="matchesPlayed" />
      </div>

      <div class="form-group">
        <label>Goals</label>
        <input type="number" [(ngModel)]="player.goals" name="goals" />
      </div>

      <div class="form-group">
        <label>Assists</label>
        <input type="number" [(ngModel)]="player.assists" name="assists" />
      </div>

      <div class="form-group">
        <label>Minutes Played</label>
        <input type="number" [(ngModel)]="player.minutesPlayed" name="minutesPlayed" />
      </div>

      <div class="form-group">
        <label>Yellow Cards</label>
        <input type="number" [(ngModel)]="player.yellowCards" name="yellowCards" />
      </div>

      <div class="form-group">
        <label>Red Cards</label>
        <input type="number" [(ngModel)]="player.redCards" name="redCards" />
      </div>

      <div class="form-group">
        <label>Shots On Target</label>
        <input type="number" [(ngModel)]="player.shotsOnTarget" name="shotsOnTarget" />
      </div>

      <div class="form-group">
        <label>Pass Accuracy</label>
        <input type="number" step="0.1" [(ngModel)]="player.passAccuracy" name="passAccuracy" />
      </div>

      <div class="form-group">
        <label>Form Rating</label>
        <input type="number" step="0.1" [(ngModel)]="player.formRating" name="formRating" />
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" [(ngModel)]="player.injuryStatus" name="injuryStatus" />
          Injured
        </label>
      </div>

      <div class="form-group">
        <label>Expected Goals (xG)</label>
        <input type="number" step="0.1" [(ngModel)]="player.expectedGoals" name="expectedGoals" />
      </div>

      <div class="form-group">
        <label>Expected Assists (xA)</label>
        <input type="number" step="0.1" [(ngModel)]="player.expectedAssists" name="expectedAssists" />
      </div>

      <div class="form-group">
        <label>Key Passes</label>
        <input type="number" [(ngModel)]="player.keyPasses" name="keyPasses" />
      </div>

      <div class="form-group">
        <label>Progressive Passes</label>
        <input type="number" [(ngModel)]="player.progressivePasses" name="progressivePasses" />
      </div>

      <div class="form-group">
        <label>Dribbles Completed</label>
        <input type="number" [(ngModel)]="player.dribblesCompleted" name="dribblesCompleted" />
      </div>

      <div class="form-group">
        <label>Tackles Won</label>
        <input type="number" [(ngModel)]="player.tacklesWon" name="tacklesWon" />
      </div>

      <div class="form-group">
        <label>Interceptions</label>
        <input type="number" [(ngModel)]="player.interceptions" name="interceptions" />
      </div>

      <div class="form-group">
        <label>Ball Recoveries</label>
        <input type="number" [(ngModel)]="player.ballRecoveries" name="ballRecoveries" />
      </div>

      <div class="form-group">
        <label>Matches Missed</label>
        <input type="number" [(ngModel)]="player.matchesMissed" name="matchesMissed" />
      </div>

      <div class="form-group">
        <label>Recent Match Load</label>
        <input type="number" [(ngModel)]="player.recentMatchLoad" name="recentMatchLoad" />
      </div>

    </div>

    <div class="button-row">
      <button type="submit" [disabled]="saving || !playerForm.form.valid" class="btn-save">
        {{ saving ? 'Saving...' : 'Save Changes' }}
      </button>

      <button type="button" (click)="delete()" [disabled]="deleting" class="btn-delete">
        {{ deleting ? 'Deleting...' : 'Delete Player' }}
      </button>
    </div>
  </form>
}
